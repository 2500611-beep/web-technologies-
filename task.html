<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Weather App</title>

<style>

body{
font-family: Arial;
background-image:url("https://images.unsplash.com/photo-1509316785289-025f5b846b35");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

/* GLASS BOX */

.container{
background:rgba(255,255,255,0.18);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.3);
padding:30px;
width:380px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 35px rgba(0,0,0,0.4);
}

/* TITLE */

h2{
color:#0a2540;
font-weight:bold;
margin-bottom:15px;
}

/* INPUT */

input{
padding:12px;
width:60%;
border-radius:10px;
border:none;
outline:none;
font-size:14px;
}

/* BUTTON */

button{
padding:12px 16px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
cursor:pointer;
margin:5px;
font-weight:bold;
}

button:hover{
background:#2563eb;
}

/* WEATHER ICON */

.weather img{
width:90px;
}

/* TEMP */

.temp{
font-size:38px;
font-weight:bold;
color:#0a2540;
}

/* CITY */

#city{
color:#0a2540;
font-weight:bold;
font-size:24px;
}

/* CONDITION */

#condition{
color:#34495e;
font-size:18px;
}

/* DETAILS */

.details{
margin-top:10px;
font-size:15px;
color:#2c3e50;
}

/* TIME */

#time{
margin:12px;
font-size:15px;
color:#2c3e50;
font-weight:bold;
}

/* FORECAST */

.forecast{
display:flex;
justify-content:space-between;
margin-top:15px;
font-size:12px;
}

.forecast div{
background:rgba(255,255,255,0.35);
padding:8px;
border-radius:10px;
width:65px;
color:#1a1a1a;
font-weight:bold;
}

/* HISTORY */

.history span{
display:inline-block;
background:rgba(255,255,255,0.4);
padding:6px 12px;
margin:5px;
border-radius:20px;
cursor:pointer;
color:#1a1a1a;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>🌦 Smart Weather App</h2>

<div>
<input type="text" id="cityInput" placeholder="Enter city">
<button onclick="getWeather()">Search</button>
<button onclick="getLocationWeather()">📍</button>
</div>

<div id="time"></div>

<div class="weather" id="weatherBox" style="display:none">

<h3 id="city"></h3>

<img id="icon">

<div class="temp" id="temp"></div>

<div id="condition"></div>

<div class="details">
Humidity: <span id="humidity"></span>% |
Wind: <span id="wind"></span> m/s
</div>

</div>

<h4>5 Day Forecast</h4>
<div class="forecast" id="forecast"></div>

<h4>Recent Searches</h4>
<div class="history" id="history"></div>

</div>

<script>

const apiKey="32a6df169324fa78f595d109d4c21bed";

function updateTime(){
let now=new Date();
document.getElementById("time").innerText=now.toLocaleString();
}
setInterval(updateTime,1000);

async function getWeather(cityName){

let city=cityName || document.getElementById("cityInput").value;

if(city==="") return;

let url=`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

let response=await fetch(url);
let data=await response.json();

document.getElementById("city").innerText=data.name;
document.getElementById("temp").innerText=data.main.temp+" °C";
document.getElementById("condition").innerText=data.weather[0].description;

document.getElementById("humidity").innerText=data.main.humidity;
document.getElementById("wind").innerText=data.wind.speed;

let icon=data.weather[0].icon;
document.getElementById("icon").src=`https://openweathermap.org/img/wn/${icon}@2x.png`;

document.getElementById("weatherBox").style.display="block";

saveHistory(city);
getForecast(city);

}

async function getForecast(city){

let url=`https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${apiKey}&units=metric`;

let response=await fetch(url);
let data=await response.json();

let forecastDiv=document.getElementById("forecast");
forecastDiv.innerHTML="";

for(let i=0;i<5;i++){

let day=data.list[i*8];

let div=document.createElement("div");

div.innerHTML=`
${new Date(day.dt_txt).toLocaleDateString()}
<br>
${day.main.temp}°C
`;

forecastDiv.appendChild(div);

}

}

function saveHistory(city){

let history=JSON.parse(localStorage.getItem("history"))||[];

if(!history.includes(city)){
history.unshift(city);
}

history=history.slice(0,5);

localStorage.setItem("history",JSON.stringify(history));

showHistory();

}

function showHistory(){

let history=JSON.parse(localStorage.getItem("history"))||[];

let div=document.getElementById("history");
div.innerHTML="";

history.forEach(city=>{
let span=document.createElement("span");
span.innerText=city;
span.onclick=()=>getWeather(city);
div.appendChild(span);
});

}

function getLocationWeather(){

navigator.geolocation.getCurrentPosition(async position=>{

let lat=position.coords.latitude;
let lon=position.coords.longitude;

let url=`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric`;

let response=await fetch(url);
let data=await response.json();

getWeather(data.name);

});

}

document.getElementById("cityInput").addEventListener("keypress",function(e){
if(e.key==="Enter") getWeather();
});

showHistory();

</script>

</body>
</html>
